<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrumWay Web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4 shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">ScrumWay Web</a>
    <button class="btn btn-outline-secondary btn-sm" id="btnTheme">Tema escuro</button>
  </div>
</nav>
<div class="container-fluid px-3 pb-5">
  <div id="flashContainer"></div>

  <section id="loginSection" class="view-section">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-sm">
          <h2 class="mb-4">Login</h2>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Usuário</label>
              <input type="text" class="form-control" id="loginUsername" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Entrar</button>
          </form>
          <div class="mt-3 text-center">
            <button class="btn btn-link p-0" id="showRegister">Cadastrar</button><br>
            <button class="btn btn-link p-0" id="showForgot">Esqueci minha senha</button><br>
            <button class="btn btn-link p-0 mt-2" id="debugBtn" style="font-size: 0.8em; color: #666;">Debug</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="registerSection" class="view-section hidden">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-sm">
          <h2 class="mb-4">Cadastro</h2>
          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label">Usuário</label>
              <input type="text" class="form-control" id="registerUsername" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="registerEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input type="password" class="form-control" id="registerPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirmar senha</label>
              <input type="password" class="form-control" id="registerConfirmPassword" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Cadastrar</button>
          </form>
          <div class="mt-3 text-center">
            <button class="btn btn-link p-0" id="backToLoginFromRegister">Voltar ao login</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="forgotSection" class="view-section hidden">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-sm">
          <h2 class="mb-4">Recuperar senha</h2>
          <form id="forgotForm">
            <div class="mb-3">
              <label class="form-label">Usuário</label>
              <input type="text" class="form-control" id="forgotUsername" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="forgotEmail" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Continuar</button>
          </form>
          <div class="mt-3 text-center">
            <button class="btn btn-link p-0" id="backToLoginFromForgot">Voltar ao login</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="resetSection" class="view-section hidden">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-sm">
          <h2 class="mb-4">Nova senha</h2>
          <form id="resetForm">
            <div class="mb-3">
              <label class="form-label">Nova senha</label>
              <input type="password" class="form-control" id="resetPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirmar senha</label>
              <input type="password" class="form-control" id="resetConfirmPassword" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Redefinir senha</button>
          </form>
          <div class="mt-3 text-center">
            <button class="btn btn-link p-0" id="backToLoginFromReset">Voltar ao login</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="boardSection" class="view-section hidden">
    <div class="row mb-3">
      <div class="col-md-8">
        <h2>Quadro SCRUM</h2>
        <p>Bem-vindo(a), <strong id="boardUsername"></strong></p>
      </div>
      <div class="col-md-4 text-md-end">
        <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">Sair</button>
      </div>
    </div>

    <div class="row gy-4">
      <div class="col-12">
        <div class="board-columns-wrapper">
          <div class="card board-column p-3 shadow-sm">
            <h5 class="mb-3">Criar nova tarefa</h5>
            <form id="createTaskForm" class="mb-4">
              <div class="mb-3">
                <label class="form-label">Título</label>
                <input class="form-control form-control-sm" type="text" id="newTaskTitle" placeholder="Título da tarefa" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea class="form-control form-control-sm" id="newTaskDescription" rows="4" placeholder="Descrição da tarefa"></textarea>
              </div>
              <button class="btn btn-primary btn-sm w-100" type="submit">Criar tarefa</button>
            </form>

            <h5 class="mb-3">Equipe</h5>
            <form id="addMemberForm" class="mb-3">
              <div class="input-group input-group-sm">
                <input type="text" id="newMemberName" class="form-control" placeholder="Nome do membro" maxlength="50" required>
                <button class="btn btn-primary" type="submit">Adicionar</button>
              </div>
            </form>
            <div id="membersList" class="d-flex flex-wrap gap-2"></div>
            <div class="mt-4">
              <h5 class="mb-3">Visão do Produto</h5>
              <form id="productVisionForm">
                <div class="mb-3">
                  <textarea class="form-control form-control-sm" id="productVisionText" rows="5" placeholder="Descreva a visão final do projeto e do produto"></textarea>
                </div>
                <button class="btn btn-secondary btn-sm w-100" type="submit">Salvar visão</button>
              </form>
            </div>
            <div class="mt-4">
              <h5 class="mb-3">Definition of Done (DoD)</h5>
              <form id="dodForm">
                <div class="mb-3">
                  <textarea class="form-control form-control-sm" id="dodText" rows="5" placeholder="Defina os critérios para considerar uma tarefa como concluída"></textarea>
                </div>
                <button class="btn btn-secondary btn-sm w-100" type="submit">Salvar DoD</button>
              </form>
            </div>
          </div>

          <div class="card board-column p-3 shadow-sm">
            <h5 class="mb-3">STORIES <span class="badge bg-secondary" id="countStories">0</span></h5>
            <div class="task-list" data-column="stories" id="columnStories"></div>
          </div>
          <div class="card board-column p-3 shadow-sm">
            <h5 class="mb-3">A FAZER <span class="badge bg-secondary" id="countTodo">0</span></h5>
            <div class="task-list" data-column="todo" id="columnTodo"></div>
          </div>
          <div class="card board-column p-3 shadow-sm">
            <h5 class="mb-3">EM PROCESSO <span class="badge bg-secondary" id="countInProgress">0</span></h5>
            <div class="task-list" data-column="inprogress" id="columnInProgress"></div>
          </div>
          <div class="card board-column p-3 shadow-sm">
            <h5 class="mb-3">REALIZADAS <span class="badge bg-secondary" id="countDone">0</span></h5>
            <div class="task-list" data-column="done" id="columnDone"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="row gy-4 mt-3">
      <div class="col-12">
        <div class="card p-4 shadow-sm">
          <h4>Observações</h4>
          <form id="notesForm">
            <textarea id="notesText" rows="10" class="form-control textarea-notes mb-3" placeholder="Escreva suas observações aqui..."></textarea>
            <button class="btn btn-primary" type="submit">Salvar notas</button>
          </form>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="selection-popup" id="selectionPopup"></div>

<div class="modal fade" id="editTaskModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar tarefa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editTaskForm">
          <input type="hidden" id="editTaskId">
          <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" class="form-control" id="editTaskTitle" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea class="form-control" id="editTaskDescription" rows="4"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Complexidade</label>
            <div class="input-group mb-2">
              <button type="button" class="btn btn-outline-secondary" id="decrementPriority">-</button>
              <input type="text" class="form-control text-center" id="editTaskPriority" readonly>
              <button type="button" class="btn btn-outline-secondary" id="incrementPriority">+</button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Responsável</label>
            <select class="form-select" id="editTaskAssignee"></select>
          </div>
          <div class="mb-3">
            <label class="form-label">Coluna</label>
            <select class="form-select" id="editTaskColumn">
              <option value="stories">STORIES</option>
              <option value="todo">A FAZER</option>
              <option value="inprogress">EM PROCESSO</option>
              <option value="done">REALIZADAS</option>
            </select>
          </div>
          <div class="text-end">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
