<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrumWay | Gestão Inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="#">ScrumWay</a>
    <div class="d-flex align-items-center gap-2">
      <div id="authButtons" class="hidden">
        <button class="btn btn-outline-primary btn-sm me-2" id="exportDataBtn">Exportar Backup</button>
        <button class="btn btn-outline-secondary btn-sm" id="importDataBtn">Importar</button>
        <input type="file" id="importFile" class="hidden" accept=".json">
      </div>
      <button class="btn btn-light btn-sm shadow-sm" id="btnTheme">Tema escuro</button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 pb-5">
  <div id="flashContainer"></div>

  <!-- Auth Sections -->
  <section id="loginSection" class="view-section">
    <div class="row justify-content-center mt-5">
      <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow">
          <div class="text-center mb-4">
            <h2 class="h3">Bem-vindo</h2>
            <p class="text-muted">Acesse seu quadro de trabalho</p>
          </div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Usuário</label>
              <input type="text" class="form-control" id="loginUsername" placeholder="Digite seu usuário" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button class="btn btn-primary w-100 py-2" type="submit">Entrar no Sistema</button>
          </form>
          <div class="mt-4 text-center small">
            <button class="btn btn-link text-decoration-none p-0" id="showRegister">Criar nova conta</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="registerSection" class="view-section hidden">
    <div class="row justify-content-center mt-5">
      <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow">
          <h2 class="h3 mb-4">Novo Cadastro</h2>
          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label">Usuário</label>
              <input type="text" class="form-control" id="registerUsername" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="registerEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input type="password" class="form-control" id="registerPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirmar senha</label>
              <input type="password" class="form-control" id="registerConfirmPassword" required>
            </div>
            <button class="btn btn-primary w-100 py-2" type="submit">Criar Conta</button>
          </form>
          <div class="mt-3 text-center">
            <button class="btn btn-link text-decoration-none" id="backToLoginFromRegister">Voltar ao login</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Board Section -->
  <section id="boardSection" class="view-section hidden">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <div>
        <h2 class="mb-1">Quadro SCRUM</h2>
        <p class="text-muted mb-0">Olá, <span id="boardUsername" class="fw-bold text-primary"></span>. Organize suas sprints com eficiência.</p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" id="debugBtn">Debug</button>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">Sair da Sessão</button>
      </div>
    </div>

    <div class="board-columns-wrapper pb-3">
      <!-- Config Column -->
      <div class="board-column">
        <div class="column-header">
          <h6 class="mb-0 text-uppercase tracking-wider">Configurações</h6>
        </div>
        
        <div class="card p-3 mb-4 shadow-sm">
          <h6 class="small fw-bold mb-3">Nova Tarefa</h6>
          <form id="createTaskForm">
            <input class="form-control form-control-sm mb-2" type="text" id="newTaskTitle" placeholder="O que precisa ser feito?" required>
            <textarea class="form-control form-control-sm mb-3" id="newTaskDescription" rows="2" placeholder="Detalhes (opcional)"></textarea>
            <button class="btn btn-primary btn-sm w-100" type="submit">Adicionar Tarefa</button>
          </form>
        </div>

        <div class="card p-3 shadow-sm">
          <h6 class="small fw-bold mb-3">Time</h6>
          <form id="addMemberForm" class="mb-3">
            <div class="input-group input-group-sm">
              <input type="text" id="newMemberName" class="form-control" placeholder="Nome do membro" required>
              <button class="btn btn-primary" type="submit">+</button>
            </div>
          </form>
          <div id="membersList" class="d-flex flex-wrap gap-2"></div>
        </div>
      </div>

      <!-- Logic Columns -->
      <div class="board-column">
        <div class="column-header">
          <div><span class="column-dot" style="background: var(--stories-color)"></span><span class="fw-bold">STORIES</span></div>
          <span class="badge rounded-pill shadow-sm" id="countStories">0</span>
        </div>
        <div class="task-list" data-column="stories" id="columnStories"></div>
      </div>

      <div class="board-column">
        <div class="column-header">
          <div><span class="column-dot" style="background: var(--todo-color)"></span><span class="fw-bold">A FAZER</span></div>
          <span class="badge rounded-pill shadow-sm" id="countTodo">0</span>
        </div>
        <div class="task-list" data-column="todo" id="columnTodo"></div>
      </div>

      <div class="board-column">
        <div class="column-header">
          <div><span class="column-dot" style="background: var(--inprogress-color)"></span><span class="fw-bold">EM PROCESSO</span></div>
          <span class="badge rounded-pill shadow-sm" id="countInProgress">0</span>
        </div>
        <div class="task-list" data-column="inprogress" id="columnInProgress"></div>
      </div>

      <div class="board-column">
        <div class="column-header">
          <div><span class="column-dot" style="background: var(--done-color)"></span><span class="fw-bold">REALIZADAS</span></div>
          <span class="badge rounded-pill shadow-sm" id="countDone">0</span>
        </div>
        <div class="task-list" data-column="done" id="columnDone"></div>
      </div>
    </div>

    <!-- Extra Info Row -->
    <div class="row g-4 mt-4">
      <div class="col-md-4">
        <div class="card p-4 h-100">
          <h5 class="mb-3">Visão do Produto</h5>
          <form id="productVisionForm">
            <textarea class="form-control mb-3" id="productVisionText" rows="6" placeholder="Qual o objetivo final?"></textarea>
            <button class="btn btn-outline-primary btn-sm w-100" type="submit">Salvar Visão</button>
          </form>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-4 h-100">
          <h5 class="mb-3">Definition of Done</h5>
          <form id="dodForm">
            <textarea class="form-control mb-3" id="dodText" rows="6" placeholder="Critérios de aceite..."></textarea>
            <button class="btn btn-outline-primary btn-sm w-100" type="submit">Salvar DoD</button>
          </form>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-4 h-100">
          <h5 class="mb-3">Notas Rápidas</h5>
          <form id="notesForm">
            <textarea id="notesText" rows="6" class="form-control mb-3" placeholder="Anotações gerais..."></textarea>
            <button class="btn btn-outline-primary btn-sm w-100" type="submit">Salvar Notas</button>
          </form>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="selection-popup" id="selectionPopup"></div>

<!-- Modal Editar -->
<div class="modal fade" id="editTaskModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="fw-bold">Editar Tarefa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editTaskForm">
          <input type="hidden" id="editTaskId">
          <div class="mb-3">
            <label class="form-label small fw-bold">Título</label>
            <input type="text" class="form-control" id="editTaskTitle" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Descrição</label>
            <textarea class="form-control" id="editTaskDescription" rows="3"></textarea>
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label small fw-bold">Complexidade</label>
              <div class="input-group">
                <button type="button" class="btn btn-light border" id="decrementPriority">-</button>
                <input type="text" class="form-control text-center" id="editTaskPriority" readonly>
                <button type="button" class="btn btn-light border" id="incrementPriority">+</button>
              </div>
            </div>
            <div class="col-6 mb-3">
              <label class="form-label small fw-bold">Coluna</label>
              <select class="form-select" id="editTaskColumn">
                <option value="stories">STORIES</option>
                <option value="todo">A FAZER</option>
                <option value="inprogress">EM PROCESSO</option>
                <option value="done">REALIZADAS</option>
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-bold">Responsável</label>
            <select class="form-select" id="editTaskAssignee"></select>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
