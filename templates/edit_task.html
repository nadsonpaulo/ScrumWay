{% extends 'base.html' %}
{% block title %}Editar Tarefa{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card p-4 shadow-sm">
      <h2 class="mb-4">Editar Tarefa</h2>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Título</label>
          <input type="text" name="title" value="{{ task.title }}" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Descrição</label>
          <textarea name="description" class="form-control" rows="4">{{ task.description }}</textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Complexidade</label>
          <div class="input-group mb-2">
            <button type="button" class="btn btn-outline-secondary btn-decrement" data-target="edit-priority">-</button>
            <input type="text" name="priority" id="edit-priority" class="form-control text-center" value="{{ task.priority_form }}" data-index="{{ task.priority_index }}" readonly>
            <button type="button" class="btn btn-outline-secondary btn-increment" data-target="edit-priority">+</button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Responsável</label>
          <input type="hidden" name="assignee" id="edit-assignee" value="{{ task.assignee }}">
          <div class="dropdown">
            <button type="button" class="btn btn-outline-secondary w-100 text-start" id="assignee-btn-edit" data-bs-toggle="dropdown">
              <span id="assignee-display-edit">{{ task.assignee or 'Selecione um membro' }}</span> <i class="bi bi-chevron-down ms-auto"></i>
            </button>
            <ul class="dropdown-menu w-100" aria-labelledby="assignee-btn-edit">
              {% for member in team_members %}
                <li>
                  <button type="button" class="dropdown-item team-member-card d-flex align-items-center" style="background-color: rgba(0,0,0,0); border-left: 4px solid {{ member.color }};" data-target="edit-assignee" data-display="assignee-display-edit" data-name="{{ member.name }}" data-color="{{ member.color }}">
                    <span class="d-inline-block" style="width: 16px; height: 16px; background-color: {{ member.color }}; border-radius: 4px; margin-right: 8px;"></span>
                    {{ member.name }}
                  </button>
                </li>
              {% else %}
                <li><span class="dropdown-item text-muted">Nenhum membro cadastrado</span></li>
              {% endfor %}
            </ul>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Coluna</label>
          <select name="column" class="form-select">
            {% for key, label in columns %}
              <option value="{{ key }}" {% if task.column == key %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <button class="btn btn-primary" type="submit">Salvar</button>
        <a class="btn btn-secondary ms-2" href="{{ url_for('board') }}">Cancelar</a>
      </form>
    </div>
  </div>
</div>
<script>
  const fibonacci = {{ fibonacci_sequence|tojson }};

  function updateFibControl(control, direction) {
    const targetId = control.dataset.target;
    const input = document.getElementById(targetId);
    if (!input) return;
    const currentIndex = Number(input.dataset.index) || 0;
    let nextIndex = currentIndex;
    if (direction === 'up' && currentIndex < fibonacci.length - 1) {
      nextIndex = currentIndex + 1;
    }
    if (direction === 'down' && currentIndex > 0) {
      nextIndex = currentIndex - 1;
    }
    input.dataset.index = nextIndex;
    input.value = fibonacci[nextIndex];
  }

  document.querySelectorAll('.btn-increment').forEach((button) => {
    button.addEventListener('click', () => updateFibControl(button, 'up'));
  });
  document.querySelectorAll('.btn-decrement').forEach((button) => {
    button.addEventListener('click', () => updateFibControl(button, 'down'));
  });

  document.querySelectorAll('.team-member-card').forEach((button) => {
    button.addEventListener('click', (e) => {
      e.preventDefault();
      const targetId = button.dataset.target;
      const displayId = button.dataset.display;
      const input = document.getElementById(targetId);
      const display = document.getElementById(displayId);
      if (!input) return;
      const name = button.dataset.name;
      input.value = name;
      if (display) {
        display.textContent = name;
      }
      // Fechar o dropdown
      const dropdownBtn = document.getElementById('assignee-btn-edit');
      if (dropdownBtn) {
        const dropdown = bootstrap.Dropdown.getInstance(dropdownBtn);
        if (dropdown) {
          dropdown.hide();
        }
      }
    });
  });
</script>
{% endblock %}
